name: Build Multi-Platform Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ursina panda3d pyinstaller

    # --- WINDOWS COMPILATION ---
    - name: Build Executable (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconfirm --onedir --windowed --add-data "assets;assets" --collect-all "ursina" --collect-all "panda3d" main.py

    # --- MACOS COMPILATION ---
    - name: Build Executable (Mac)
      if: matrix.os == 'macos-latest'
      run: pyinstaller --noconfirm --onedir --windowed --add-data "assets:assets" --collect-all "ursina" --collect-all "panda3d" main.py

    # --- LINUX COMPILATION ---
    - name: Build Executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --noconfirm --onedir --windowed --add-data "assets:assets" --collect-submodules "direct" --collect-submodules "panda3d" --collect-all "panda3d" --collect-all "ursina" main.py

    # --- UPLOAD FINAL FILES ---
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: game-distribution-${{ matrix.os }}
        path: dist/
